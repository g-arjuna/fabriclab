<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <style>
      .label { font-family: ui-sans-serif, system-ui, sans-serif; fill: #e2e8f0; }
      .muted { font-family: ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .mono { font-family: ui-monospace, SFMono-Regular, monospace; fill: #cbd5e1; }
      .cursor { animation: blink 1.2s step-end infinite; }
      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="700" rx="32" fill="url(#bg)"/>
  <text x="60" y="66" class="label" font-size="34" font-weight="700">One rail, three CLI viewpoints</text>
  <text x="60" y="100" class="muted" font-size="20">FabricLab keeps each device context separate so diagnosis stays grounded.</text>

  <rect x="70" y="136" width="1060" height="504" rx="28" fill="#101827" stroke="#1e293b"/>

  <rect x="100" y="170" width="300" height="188" rx="22" fill="#0b1220" stroke="#1e293b"/>
  <rect x="100" y="170" width="300" height="34" rx="22" fill="#052e16"/>
  <text x="128" y="192" class="mono" font-size="16">$ dgx-host</text>
  <text x="128" y="232" class="label" font-size="18" font-weight="700">DGX host view</text>
  <text x="128" y="266" class="mono" font-size="17">dgx-a:~$ ibstat</text>
  <text x="128" y="300" class="mono" font-size="17" fill="#22c55e">State: Active</text>
  <text x="128" y="330" class="mono" font-size="17">Link layer: Ethernet</text>
  <rect x="128" y="336" width="10" height="18" fill="#22c55e" class="cursor"/>

  <rect x="450" y="170" width="300" height="188" rx="22" fill="#0b1220" stroke="#1e293b"/>
  <rect x="450" y="170" width="300" height="34" rx="22" fill="#082f49"/>
  <text x="478" y="192" class="mono" font-size="16"># leaf-switch</text>
  <text x="478" y="232" class="label" font-size="18" font-weight="700">Leaf switch view</text>
  <text x="478" y="266" class="mono" font-size="17">leaf# show interface counters</text>
  <text x="478" y="300" class="mono" font-size="17">Drops: 0   Pause: 12847</text>
  <text x="478" y="330" class="mono" font-size="17">Buffer util: 87%</text>
  <rect x="478" y="336" width="10" height="18" fill="#38bdf8" class="cursor"/>

  <rect x="800" y="170" width="300" height="188" rx="22" fill="#0b1220" stroke="#1e293b"/>
  <rect x="800" y="170" width="300" height="34" rx="22" fill="#4c1d95"/>
  <text x="828" y="192" class="mono" font-size="16"># onyx-switch</text>
  <text x="828" y="232" class="label" font-size="18" font-weight="700">ONYX / IB view</text>
  <text x="828" y="266" class="mono" font-size="17">show interfaces ib status</text>
  <text x="828" y="300" class="mono" font-size="17">IB1/1 Active</text>
  <text x="828" y="330" class="mono" font-size="17" fill="#f59e0b">IB1/4 Polling</text>
  <rect x="828" y="336" width="10" height="18" fill="#a78bfa" class="cursor"/>

  <rect x="220" y="420" width="760" height="154" rx="26" fill="#0b1220" stroke="#1e293b"/>
  <text x="600" y="458" class="label" text-anchor="middle" font-size="26" font-weight="700">Shared topology map</text>
  <text x="600" y="490" class="muted" text-anchor="middle" font-size="18">Each CLI is describing the same fabric from a different angle.</text>

  <circle cx="390" cy="525" r="30" fill="#14532d" stroke="#22c55e"/>
  <text x="390" y="530" class="mono" text-anchor="middle" font-size="15">DGX</text>

  <circle cx="600" cy="525" r="30" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="600" y="530" class="mono" text-anchor="middle" font-size="15">Leaf</text>

  <circle cx="810" cy="525" r="30" fill="#4c1d95" stroke="#a78bfa"/>
  <text x="810" y="530" class="mono" text-anchor="middle" font-size="15">ONYX</text>

  <path d="M420 525 H570" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M630 525 H780" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
  <text x="600" y="562" class="muted" text-anchor="middle" font-size="16">one fabric, many operational views</text>

  <path d="M250 358 C250 392 320 402 360 420" stroke="#22c55e" stroke-width="4" stroke-dasharray="8 8"/>
  <path d="M600 358 V420" stroke="#38bdf8" stroke-width="4" stroke-dasharray="8 8"/>
  <path d="M950 358 C950 392 880 402 840 420" stroke="#a78bfa" stroke-width="4" stroke-dasharray="8 8"/>
</svg>
