<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132034"/>
      <stop offset="1" stop-color="#0b1526"/>
    </linearGradient>
    <style>
      .label { font-family: ui-sans-serif, system-ui, sans-serif; fill: #e2e8f0; }
      .muted { font-family: ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .mono { font-family: ui-monospace, SFMono-Regular, monospace; fill: #cbd5e1; }
      .warn { animation: warnPulse 1.7s ease-in-out infinite; }
      .ok { animation: okPulse 2.2s ease-in-out infinite; }
      @keyframes warnPulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
      }
      @keyframes okPulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1200" height="680" rx="32" fill="url(#bg)"/>
  <text x="60" y="70" class="label" font-size="30" font-weight="700">The same cable can look healthy from one side and broken from the other</text>
  <text x="60" y="104" class="muted" font-size="18">This is why Chapter 3 insists on checking both ends of the link.</text>

  <rect x="56" y="146" width="1088" height="478" rx="30" fill="url(#panel)" stroke="#1e293b"/>

  <rect x="114" y="250" width="250" height="170" rx="24" fill="#0f172a" stroke="#334155"/>
  <text x="239" y="292" class="label" text-anchor="middle" font-size="24" font-weight="700">DGX NIC view</text>
  <text x="239" y="318" class="muted" text-anchor="middle" font-size="15">what ibstat / rdma link show sees</text>

  <rect x="146" y="344" width="186" height="42" rx="14" fill="#052e16" stroke="#22c55e"/>
  <text x="239" y="370" class="mono" text-anchor="middle" font-size="18">state ACTIVE</text>
  <circle cx="314" cy="219" r="10" fill="#22c55e" class="ok"/>
  <text x="239" y="454" class="muted" text-anchor="middle" font-size="15">signal present, local side initialized</text>

  <rect x="836" y="250" width="250" height="170" rx="24" fill="#0f172a" stroke="#334155"/>
  <text x="961" y="292" class="label" text-anchor="middle" font-size="24" font-weight="700">Switch port view</text>
  <text x="961" y="318" class="muted" text-anchor="middle" font-size="15">what the leaf switch reports</text>

  <rect x="868" y="344" width="186" height="42" rx="14" fill="#451a03" stroke="#ef4444"/>
  <text x="961" y="370" class="mono" text-anchor="middle" font-size="18">ERR-DISABLED</text>
  <circle cx="1036" cy="219" r="10" fill="#ef4444" class="warn"/>
  <text x="961" y="454" class="muted" text-anchor="middle" font-size="15">link flap detected, port disabled</text>

  <g>
    <rect x="444" y="266" width="312" height="136" rx="28" fill="#111827" stroke="#334155"/>
    <rect x="486" y="312" width="228" height="24" rx="12" fill="#1e293b" stroke="#475569"/>
    <rect x="500" y="316" width="200" height="16" rx="8" fill="#94a3b8"/>
    <text x="600" y="291" class="label" text-anchor="middle" font-size="22" font-weight="700">One physical cable</text>
    <text x="600" y="366" class="muted" text-anchor="middle" font-size="14">same optics, same lane, two different software perspectives</text>
  </g>

  <path d="M364 334 C408 334 420 334 444 334" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
  <path d="M756 334 C792 334 812 334 836 334" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>

  <text x="600" y="548" class="label" text-anchor="middle" font-size="22" font-weight="700">Diagnostic rule</text>
  <text x="600" y="584" class="muted" text-anchor="middle" font-size="18">If the DGX says ACTIVE but the switch says ERR-DISABLED or POLLING, trust neither side alone.</text>
</svg>
