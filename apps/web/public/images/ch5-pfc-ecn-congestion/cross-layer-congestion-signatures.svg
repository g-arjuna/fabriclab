<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Cross-layer congestion signatures</title>
  <desc id="desc">Comparison matrix for Chapter 5 showing how healthy bursts, silent congestion, and true capacity failure look across application behavior, switch counters, NIC counters, and operational interpretation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0c1832" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <style>
      .title { font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .softPulse { animation: softPulse 2.8s ease-in-out infinite; }
      @keyframes softPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)" />
  <circle cx="220" cy="180" r="170" fill="#22c55e" opacity="0.08" filter="url(#soft)" />
  <circle cx="860" cy="1050" r="210" fill="#38bdf8" opacity="0.08" filter="url(#soft)" />
  <circle cx="1380" cy="220" r="180" fill="#ef4444" opacity="0.08" filter="url(#soft)" />

  <text x="90" y="90" font-size="48" fill="#f8fafc" class="title">Cross-check the fabric across layers</text>
  <text x="90" y="132" font-size="22" fill="#94a3b8" class="title">Act 8 asks you to avoid one-counter thinking. The same slowdown means different things depending on what the switch and the NIC see together.</text>

  <rect x="70" y="190" width="1460" height="930" rx="34" fill="#0f172a" stroke="#1e293b" stroke-width="2" />

  <rect x="110" y="238" width="260" height="832" rx="24" fill="#0b1220" stroke="#334155" stroke-width="1.5" />
  <text x="146" y="292" font-size="26" fill="#f8fafc" class="title">Read across rows</text>
  <text x="146" y="332" font-size="19" fill="#94a3b8" class="mono">Each row is one layer of evidence.</text>
  <g font-size="22" fill="#e2e8f0" class="title">
    <text x="146" y="434">Application</text>
    <text x="146" y="590">Switch</text>
    <text x="146" y="746">NIC</text>
    <text x="146" y="902">Interpretation</text>
  </g>
  <g font-size="16" fill="#64748b" class="mono">
    <text x="146" y="462">What operators feel first</text>
    <text x="146" y="618">Queue and fabric-facing counters</text>
    <text x="146" y="774">Host-side signals</text>
    <text x="146" y="930">Actionable conclusion</text>
  </g>

  <g transform="translate(400 238)">
    <rect x="0" y="0" width="340" height="832" rx="24" fill="#052e16" stroke="#22c55e" stroke-width="1.5" />
    <text x="34" y="54" font-size="28" fill="#bbf7d0" class="title">Healthy brief burst</text>
    <text x="34" y="90" font-size="18" fill="#d1fae5" class="mono">Normal transient congestion</text>

    <rect x="26" y="132" width="288" height="126" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="1.2" />
    <text x="44" y="170" font-size="18" fill="#ecfdf5" class="mono">Training step stays stable.</text>
    <text x="44" y="198" font-size="18" fill="#ecfdf5" class="mono">Maybe a tiny, invisible slowdown.</text>
    <text x="44" y="226" font-size="18" fill="#ecfdf5" class="mono">No hang and no operator alarm.</text>

    <rect x="26" y="288" width="288" height="126" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="1.2" />
    <text x="44" y="326" font-size="18" fill="#ecfdf5" class="mono">Buffer rises briefly, then drains.</text>
    <text x="44" y="354" font-size="18" fill="#ecfdf5" class="mono">ECN marks appear.</text>
    <text x="44" y="382" font-size="18" fill="#ecfdf5" class="mono">PFC rare or short, drops stay 0.</text>

    <rect x="26" y="444" width="288" height="126" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="1.2" />
    <text x="44" y="482" font-size="18" fill="#ecfdf5" class="mono">rx_ecn_marked grows during burst.</text>
    <text x="44" y="510" font-size="18" fill="#ecfdf5" class="mono">Pause counters low.</text>
    <text x="44" y="538" font-size="18" fill="#ecfdf5" class="mono">No QP failure.</text>

    <rect x="26" y="600" width="288" height="178" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="1.2" />
    <text x="44" y="638" font-size="18" fill="#ecfdf5" class="mono">ECN is doing the routine work.</text>
    <text x="44" y="666" font-size="18" fill="#ecfdf5" class="mono">Keep watching trends,</text>
    <text x="44" y="694" font-size="18" fill="#ecfdf5" class="mono">but nothing is broken.</text>
    <circle cx="268" cy="682" r="14" fill="#22c55e" class="softPulse" />
  </g>

  <g transform="translate(780 238)">
    <rect x="0" y="0" width="340" height="832" rx="24" fill="#3f1906" stroke="#f59e0b" stroke-width="1.5" />
    <text x="34" y="54" font-size="28" fill="#fed7aa" class="title">Silent congestion</text>
    <text x="34" y="90" font-size="18" fill="#ffedd5" class="mono">The Lab 2 fingerprint</text>

    <rect x="26" y="132" width="288" height="126" rx="18" fill="#7c2d12" stroke="#fdba74" stroke-width="1.2" />
    <text x="44" y="170" font-size="18" fill="#fff7ed" class="mono">Training continues, but slower.</text>
    <text x="44" y="198" font-size="18" fill="#fff7ed" class="mono">No hard failure, no obvious crash.</text>
    <text x="44" y="226" font-size="18" fill="#fff7ed" class="mono">Looks "healthy enough" at first glance.</text>

    <rect x="26" y="288" width="288" height="126" rx="18" fill="#7c2d12" stroke="#fdba74" stroke-width="1.2" />
    <text x="44" y="326" font-size="18" fill="#fff7ed" class="mono">Buffer stays high.</text>
    <text x="44" y="354" font-size="18" fill="#fff7ed" class="mono">PFC pause grows.</text>
    <text x="44" y="382" font-size="18" fill="#fff7ed" class="mono">Drops can still remain 0.</text>

    <rect x="26" y="444" width="288" height="126" rx="18" fill="#7c2d12" stroke="#fdba74" stroke-width="1.2" />
    <text x="44" y="482" font-size="18" fill="#fff7ed" class="mono">rx_ecn_marked stays 0.</text>
    <text x="44" y="510" font-size="18" fill="#fff7ed" class="mono">Pause counters rise.</text>
    <text x="44" y="538" font-size="18" fill="#fff7ed" class="mono">The NIC is being stopped, not shaped.</text>

    <rect x="26" y="600" width="288" height="178" rx="18" fill="#7c2d12" stroke="#fdba74" stroke-width="1.2" />
    <text x="44" y="638" font-size="18" fill="#fff7ed" class="mono">Congestion is real,</text>
    <text x="44" y="666" font-size="18" fill="#fff7ed" class="mono">but ECN is absent or inactive.</text>
    <text x="44" y="694" font-size="18" fill="#fff7ed" class="mono">Fix the signalling layer first.</text>
    <circle cx="268" cy="682" r="14" fill="#f59e0b" class="softPulse" />
  </g>

  <g transform="translate(1160 238)">
    <rect x="0" y="0" width="340" height="832" rx="24" fill="#450a0a" stroke="#ef4444" stroke-width="1.5" />
    <text x="34" y="54" font-size="28" fill="#fecaca" class="title">Capacity failure</text>
    <text x="34" y="90" font-size="18" fill="#fee2e2" class="mono">Congestion survives every control loop</text>

    <rect x="26" y="132" width="288" height="126" rx="18" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1.2" />
    <text x="44" y="170" font-size="18" fill="#fef2f2" class="mono">Major slowdown or hang.</text>
    <text x="44" y="198" font-size="18" fill="#fef2f2" class="mono">Operators may see job instability.</text>
    <text x="44" y="226" font-size="18" fill="#fef2f2" class="mono">This no longer looks healthy.</text>

    <rect x="26" y="288" width="288" height="126" rx="18" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1.2" />
    <text x="44" y="326" font-size="18" fill="#fef2f2" class="mono">ECN active, PFC active,</text>
    <text x="44" y="354" font-size="18" fill="#fef2f2" class="mono">and drops are now non-zero.</text>
    <text x="44" y="382" font-size="18" fill="#fef2f2" class="mono">Some links may also be misbalanced.</text>

    <rect x="26" y="444" width="288" height="126" rx="18" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1.2" />
    <text x="44" y="482" font-size="18" fill="#fef2f2" class="mono">ECN marks present.</text>
    <text x="44" y="510" font-size="18" fill="#fef2f2" class="mono">Pause counters may grow too.</text>
    <text x="44" y="538" font-size="18" fill="#fef2f2" class="mono">Rate reduction is not enough.</text>

    <rect x="26" y="600" width="288" height="178" rx="18" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1.2" />
    <text x="44" y="638" font-size="18" fill="#fef2f2" class="mono">This is not just a missing knob.</text>
    <text x="44" y="666" font-size="18" fill="#fef2f2" class="mono">Look for undersized fabric</text>
    <text x="44" y="694" font-size="18" fill="#fef2f2" class="mono">or poor path distribution.</text>
    <circle cx="268" cy="682" r="14" fill="#ef4444" class="softPulse" />
  </g>

  <rect x="110" y="1144" width="1380" height="0" fill="none" />
  <rect x="110" y="1080" width="1380" height="52" rx="18" fill="#0b2742" stroke="#38bdf8" stroke-width="1.5" />
  <text x="800" y="1113" text-anchor="middle" font-size="20" fill="#dbeafe" class="mono">Rule of thumb: never trust one layer alone. Switch-only data can hide silent congestion, and host-only data cannot tell you whether you have a missing ECN signal or a true capacity wall.</text>
</svg>
