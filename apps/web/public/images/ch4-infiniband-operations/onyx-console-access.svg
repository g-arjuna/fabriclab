<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <style>
      .label { font-family: ui-sans-serif, system-ui, sans-serif; fill: #e2e8f0; }
      .muted { font-family: ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .mono { font-family: ui-monospace, SFMono-Regular, monospace; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1200" height="700" rx="32" fill="url(#bg)"/>
  <text x="60" y="70" class="label" font-size="34" font-weight="700">ONYX console access depends on the switch platform</text>
  <text x="60" y="104" class="muted" font-size="20">The login flow is the same, but the service connector changes between QM9700 and Q3400.</text>

  <rect x="70" y="150" width="500" height="460" rx="28" fill="#101827" stroke="#1e293b"/>
  <text x="110" y="200" class="label" font-size="26" font-weight="700">QM9700</text>
  <text x="110" y="230" class="muted" font-size="16">Front-panel micro-USB console port</text>

  <rect x="118" y="272" width="404" height="168" rx="24" fill="#0b1220" stroke="#334155"/>
  <rect x="138" y="292" width="364" height="30" rx="10" fill="#1f2937"/>
  <rect x="154" y="344" width="212" height="56" rx="14" fill="#111827" stroke="#475569"/>
  <rect x="390" y="352" width="52" height="36" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
  <text x="416" y="375" class="mono" text-anchor="middle" font-size="13">USB</text>
  <path d="M468 370 H520" stroke="#22c55e" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="366" y="470" class="muted" text-anchor="middle" font-size="16">Console cable connects at the switch front panel.</text>

  <rect x="110" y="492" width="420" height="82" rx="18" fill="#0b1220" stroke="#1e293b"/>
  <text x="136" y="526" class="mono" font-size="18">115200 baud</text>
  <text x="300" y="526" class="mono" font-size="18">8N1</text>
  <text x="390" y="526" class="mono" font-size="18">no flow control</text>
  <text x="136" y="554" class="muted" font-size="15">Used during bring-up, recovery, or when management SSH is unavailable.</text>

  <rect x="630" y="150" width="500" height="460" rx="28" fill="#101827" stroke="#1e293b"/>
  <text x="670" y="200" class="label" font-size="26" font-weight="700">Q3400</text>
  <text x="670" y="230" class="muted" font-size="16">RJ45 serial console port</text>

  <rect x="678" y="272" width="404" height="168" rx="24" fill="#0b1220" stroke="#334155"/>
  <rect x="698" y="292" width="364" height="30" rx="10" fill="#1f2937"/>
  <rect x="714" y="344" width="212" height="56" rx="14" fill="#111827" stroke="#475569"/>
  <rect x="950" y="348" width="72" height="44" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
  <path d="M962 358 H1010" stroke="#60a5fa" stroke-width="2"/>
  <path d="M962 368 H1010" stroke="#60a5fa" stroke-width="2"/>
  <path d="M962 378 H1010" stroke="#60a5fa" stroke-width="2"/>
  <text x="986" y="470" class="muted" text-anchor="middle" font-size="16">Same ONYX login, different physical console connector.</text>

  <rect x="670" y="492" width="420" height="82" rx="18" fill="#0b1220" stroke="#1e293b"/>
  <text x="696" y="526" class="mono" font-size="18">115200 baud</text>
  <text x="860" y="526" class="mono" font-size="18">8N1</text>
  <text x="950" y="526" class="mono" font-size="18">serial console</text>
  <text x="696" y="554" class="muted" font-size="15">Platform-specific connector choice does not change the CLI workflow that follows.</text>
</svg>
