<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132034"/>
      <stop offset="1" stop-color="#0b1526"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .label { font-family: ui-sans-serif, system-ui, sans-serif; fill: #e2e8f0; }
      .muted { font-family: ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
      .mono { font-family: ui-monospace, SFMono-Regular, monospace; fill: #cbd5e1; }
      .tcpPulse { animation: tcpPulse 1.8s ease-in-out infinite; }
      .rdmaPulse { animation: rdmaPulse 1.6s ease-in-out infinite; }
      @keyframes tcpPulse {
        0%, 100% { opacity: 0.35; }
        50% { opacity: 1; }
      }
      @keyframes rdmaPulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1200" height="820" rx="32" fill="url(#bg)"/>
  <text x="60" y="70" class="label" font-size="30" font-weight="700">Why TCP fails and what RDMA changes</text>
  <text x="60" y="104" class="muted" font-size="18">Both move data. Only one is built for barrier-sensitive training traffic.</text>

  <g filter="url(#shadow)">
    <rect x="48" y="140" width="528" height="620" rx="28" fill="url(#card)" stroke="#1e293b"/>
    <rect x="624" y="140" width="528" height="620" rx="28" fill="url(#card)" stroke="#1e293b"/>
  </g>

  <text x="84" y="192" class="label" font-size="24" font-weight="700">TCP path</text>
  <text x="84" y="222" class="muted" font-size="16">Reliable, but recovery is slow for synchronized GPU traffic.</text>

  <text x="660" y="192" class="label" font-size="24" font-weight="700">RDMA / RoCEv2 path</text>
  <text x="660" y="222" class="muted" font-size="16">NICs move data directly. The fabric must not drop packets.</text>

  <g>
    <rect x="88" y="280" width="124" height="64" rx="18" fill="#082f49" stroke="#38bdf8"/>
    <text x="150" y="304" class="label" text-anchor="middle" font-size="16" font-weight="700">GPU memory</text>
    <text x="150" y="326" class="muted" text-anchor="middle" font-size="13">gradient buffer</text>

    <rect x="246" y="280" width="124" height="64" rx="18" fill="#172554" stroke="#818cf8"/>
    <text x="308" y="304" class="label" text-anchor="middle" font-size="16" font-weight="700">CPU + kernel</text>
    <text x="308" y="326" class="muted" text-anchor="middle" font-size="13">socket stack</text>

    <rect x="404" y="280" width="124" height="64" rx="18" fill="#3f1d1d" stroke="#f87171"/>
    <text x="466" y="304" class="label" text-anchor="middle" font-size="16" font-weight="700">TCP</text>
    <text x="466" y="326" class="muted" text-anchor="middle" font-size="13">cwnd + retransmit</text>

    <line x1="214" y1="312" x2="244" y2="312" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
    <line x1="372" y1="312" x2="402" y2="312" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>

    <rect x="154" y="412" width="316" height="84" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="312" y="442" class="label" text-anchor="middle" font-size="18" font-weight="700">Ethernet fabric</text>
    <text x="312" y="468" class="muted" text-anchor="middle" font-size="14">drop happens here</text>

    <path d="M466 346 C466 386 432 396 390 412" stroke="#ef4444" stroke-width="8" stroke-linecap="round" fill="none" class="tcpPulse"/>
    <circle cx="384" cy="414" r="10" fill="#ef4444" class="tcpPulse"/>
    <text x="408" y="394" class="mono" font-size="13">loss event</text>

    <path d="M382 516 C448 548 484 596 472 654 C460 710 340 718 256 684" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" fill="none" stroke-dasharray="14 10" class="tcpPulse"/>
    <text x="432" y="618" class="mono" font-size="13">retransmit loop</text>

    <rect x="88" y="560" width="188" height="92" rx="18" fill="#451a03" stroke="#f59e0b"/>
    <text x="182" y="592" class="label" text-anchor="middle" font-size="18" font-weight="700">Result</text>
    <text x="182" y="620" class="muted" text-anchor="middle" font-size="14">millisecond-scale recovery</text>
    <text x="182" y="640" class="muted" text-anchor="middle" font-size="14">barrier waits for retransmit</text>
  </g>

  <g>
    <rect x="664" y="280" width="124" height="64" rx="18" fill="#082f49" stroke="#38bdf8"/>
    <text x="726" y="304" class="label" text-anchor="middle" font-size="16" font-weight="700">GPU memory</text>
    <text x="726" y="326" class="muted" text-anchor="middle" font-size="13">source buffer</text>

    <rect x="822" y="280" width="124" height="64" rx="18" fill="#052e16" stroke="#4ade80"/>
    <text x="884" y="304" class="label" text-anchor="middle" font-size="16" font-weight="700">NIC DMA</text>
    <text x="884" y="326" class="muted" text-anchor="middle" font-size="13">verbs + queue pairs</text>

    <rect x="980" y="280" width="124" height="64" rx="18" fill="#052e16" stroke="#4ade80"/>
    <text x="1042" y="304" class="label" text-anchor="middle" font-size="16" font-weight="700">Remote NIC</text>
    <text x="1042" y="326" class="muted" text-anchor="middle" font-size="13">direct placement</text>

    <line x1="790" y1="312" x2="820" y2="312" stroke="#4ade80" stroke-width="6" stroke-linecap="round" class="rdmaPulse"/>
    <line x1="948" y1="312" x2="978" y2="312" stroke="#4ade80" stroke-width="6" stroke-linecap="round" class="rdmaPulse"/>

    <rect x="690" y="412" width="392" height="84" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="886" y="442" class="label" text-anchor="middle" font-size="18" font-weight="700">Lossless Ethernet fabric</text>
    <text x="886" y="468" class="muted" text-anchor="middle" font-size="14">PFC + ECN protect the transport</text>

    <line x1="884" y1="346" x2="884" y2="410" stroke="#22c55e" stroke-width="8" stroke-linecap="round" class="rdmaPulse"/>
    <circle cx="884" cy="412" r="10" fill="#22c55e" class="rdmaPulse"/>

    <rect x="820" y="560" width="208" height="92" rx="18" fill="#052e16" stroke="#22c55e"/>
    <text x="924" y="592" class="label" text-anchor="middle" font-size="18" font-weight="700">Result</text>
    <text x="924" y="620" class="muted" text-anchor="middle" font-size="14">microsecond-scale transfer</text>
    <text x="924" y="640" class="muted" text-anchor="middle" font-size="14">no kernel copies, no TCP recovery path</text>
  </g>

  <text x="60" y="792" class="muted" font-size="16">RDMA is fast because the NIC does more work. It is safe only when the network below it avoids loss.</text>
</svg>
